<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css"
    integrity="sha384-CfCrinSRH2IR6a4e6fy2q6ioOX7O6Mtm1L9vRvFZ1trBncWmMePhzvafv7oIcWiW" crossorigin="anonymous" />
  <title>Just a Form</title>
</head>

<body class="bg-dark-subtle p-5">
  <form action="" id="formPay" class="needs-validation container-fluid rounded border border-black bg-white m-sm-auto"
    novalidate>

    <!-- ¡Hola! Por fin siento que empiezo a enter bootstrap jajaj
    los comentarios me ayudan mucho a organizarme.
    Al final si hice lo de la linea de alerta si le das a Submit
    y hay espacios sin llenar, tambien investigando un poco vi como 
    resaltar los espacios que faltan por llenar. -->

    <!-- Título  -->
    <div class="row bg-success-subtle text-secondary border-bottom border-black mb-3">
      <h4 class="mt-1"> Payment example</h4>
    </div>

    <!-- Linea de alerta  -->
    <div class="alert alert-danger d-none" role="alert" id="Alert">
      ¡Dejaste algunos espacios vacíos!
    </div>

    <!--Tarjeta  -->
    <div class="row g-3 pt-2 justify-content-between align-items-end">
      <div class="col-12 col-md-4">
        <label for="inputCard" class="form-label">N° de tarjeta:</label>
        <input required type="number" name="cardNumber" id="cardNumber" placeholder="xxxx-xxxx-xxxx-xxxx"
          class="form-control">
      </div>
      <div class="col-12 col-md-4">
        <label for="inputCVC" class="form-label">Código CVC:</label>
        <input required type="number" name="cvc" id="cvc" class="form-control">
      </div>
      <div class="col-12 col-md-4">
        <label for="InputMount" class="form-label">Monto a pagar:</label>
        <input required type="number" name="mount" id="mount" class="form-control">
      </div>
    </div>

    <!-- Nombres y apellidos  -->
    <div class="row g-3 mt-2">
      <div class="col-12 col-md-6">
        <label for="" class="form-label">Nombres:</label>
        <input type="text" required class="form-control" name="name" id="name" placeholder="Juan" />
      </div>
      <div class="col-12 col-md-6">
        <label for="lastName" class="form-label">Apellidos</label>
        <input type="text" required class="form-control" name="lastName" id="lastName" placeholder="Torres" />
      </div>
    </div>

    <!-- Domicilio  -->
    <div class="row g-3 mt-2">
      <div class="col-12 col-md-6">
        <label for="" class="form-label">Dirección:</label>
        <input type="text" required class="form-control" name="address" id="address" />
      </div>
      <div class="col-12 col-md-3">
          <label for="" class="form-label">Ciudad</label>
          <select class="form-select form-select-lg fw-bold" name="" id="" 
          style="font-size: 13px ;">
          <option selected>Seleccionar</option>
          <option value="">Madrid</option>
          <option value="">Narnia</option>
          <option value="">NightCity</option>
          <option value="">Shurima</option>
          <option value="">Metrópolis</option>
          <option value="">sonLas3AMTengoSueño</option>
        </select>
      </div>
      <div class="col-12 col-md-3">
        <label for="" class="form-label">Código postal:</label>
        <input type="number" required class="form-control" name="city" id="city" />
      </div>
    </div>

    <!-- Métodos de pago -->
    <div class="row g-3 mt-2 d-flex justify-content-between">
      <label for="checkPay">Métodos de pago:</label>
      <div class="col-12 col-md-4 fs-4">
        <div class="form-check form-check-inline col-1">
          <label class="form-check-label" for="radioDefault1">
            <i class="fa-brands fa-cc-visa"></i>
          </label>
          <input required class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
        </div>
        <div class="form-check form-check-inline col-1">
          <label class="form-check-label" for="radioDefault1">
            <i class="fa-brands fa-cc-mastercard"></i>
          </label>
          <input required class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
        </div>
        <div class="form-check form-check-inline col-1">
          <label class="form-check-label" for="radioDefault1">
            <i class="fa-solid fa-hand-holding-dollar"></i>
          </label>
          <input required class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
        </div>
        <div class="form-check form-check-inline col-1">
          <label class="form-check-label" for="radioDefault1">
            <i class="fa-solid fa-hand-middle-finger"></i>
          </label>
          <input required class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
        </div>
      </div>

      <!-- Comentarios -->
      <div class="col-12 col-md-6">
        <div class="mb-3">
          <label for="Commit" class="form-label">Comentarios</label>
          <textarea class="form-control" name="Commits" id="Commits" rows="3"></textarea>
        </div>
      </div>
    </div>

    <!-- botón  -->
    <div class="row bg-success-subtle text-secondary border-top border-black py-2">
      <div class="col-2 col-md-3 ">
        <button type="submit" class="btn btn-primary m-1">
          Submit
        </button>
        <button type="button" class="btn btn-secondary m-1">
          Cancelar
        </button>
      </div>
    </div>
    </div>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script>
    document.getElementById('formPay').addEventListener('submit', function (event) {
      const alert = document.getElementById('Alert');
      if (!this.checkValidity()) {
        event.preventDefault();
        event.stopPropagation();
        alert.classList.remove('d-none');
      } else {
        alert.classList.add('d-none');
      }
      this.classList.add('was-validated');
    }, false)
  </script>
</body>
</html>
